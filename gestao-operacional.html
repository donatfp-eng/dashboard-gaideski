<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gestão Operacional</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 5px solid red;
    }

    .ok {
      border-left: 5px solid green;
    }

    .btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 12px;
    }

    .topo {
      margin-bottom: 20px;
      padding: 10px;
      background: #020617;
      border-radius: 10px;
    }

    .contador {
      font-size: 18px;
      font-weight: bold;
      color: #f87171;
    }

  </style>
</head>

<body>

  <div class="topo">
    <h1>🚨 Central de Alertas</h1>
    <div class="contador" id="contador">Carregando...</div>
  </div>

  <div id="lista"></div>

<script>

async function carregarLeads() {
  const res = await fetch('/api/kommo/leads');
  const data = await res.json();

  const leads = data._embedded?.leads || [];
  const agora = new Date();

  let mapa = {};

leads.forEach(lead => {

  const id = lead.id;

  if (!mapa[id]) {
    mapa[id] = {
      lead,
      problemas: []
    };
  }

  const ultimaAtualizacao = new Date(lead.updated_at * 1000);
  const agora = new Date();
  const diffHoras = (agora - ultimaAtualizacao) / (1000 * 60 * 60);

  const temTarefa = lead.closest_task_at;

  if (!temTarefa) {
    mapa[id].problemas.push("SEM PRÓXIMA AÇÃO");
  }

  if (diffHoras > 24) {
    mapa[id].problemas.push("PARADO +24H");
  }

});

const problemas = Object.values(mapa).filter(item => item.problemas.length > 0);

render(problemas);
}

function render(problemas) {
  const lista = document.getElementById('lista');
  const contador = document.getElementById('contador');

  lista.innerHTML = "";

  contador.innerText = `⚠️ ${problemas.length} problemas encontrados`;

  if (problemas.length === 0) {
    lista.innerHTML = "<div class='card ok'>Tudo certo 🎉 Nenhum problema!</div>";
    return;
  }

  problemas.forEach(item => {

    const lead = item.lead;

    const linkKommo = `https://kommogaideskicombr.kommo.com/leads/detail/${lead.id}`;

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <strong>${lead.name}</strong><br>
      Problemas: ${item.problemas.join(", ")}<br>

      <a href="${linkKommo}" target="_blank" class="btn">
        Abrir no Kommo
      </a>
    `;

    lista.appendChild(div);
  });
}

carregarLeads();

</script>

</body>
</html>
