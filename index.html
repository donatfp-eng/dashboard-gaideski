<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial · Gaideski</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00C896;
    --verde-escuro: #00A07A;
    --azul: #0A1628;
    --azul-meio: #0F2040;
    --cinza: #1A2E48;
    --borda: rgba(0,200,150,0.15);
    --texto: #E8F4F0;
    --texto-fraco: #7A9E90;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--azul); color: var(--texto); min-height: 100vh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--borda); background: var(--azul-meio); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--verde); letter-spacing: -0.5px; }
  .logo span { color: var(--texto); }
  #status-pill { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--texto-fraco); background: var(--cinza); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--borda); }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; }
  #status-dot.ok { background: var(--verde); box-shadow: 0 0 6px var(--verde); }
  #status-dot.erro { background: #FF4D4D; }
  .main { padding: 28px 32px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card { background: var(--azul-meio); border: 1px solid var(--borda); border-radius: 16px; padding: 22px 24px; position: relative; overflow: hidden; transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); border-color: rgba(0,200,150,0.35); }
  .card-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-fraco); margin-bottom: 10px; font-family: 'Syne', sans-serif; font-weight: 600; }
  .card-valor { font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800; color: var(--verde); line-height: 1; }
  .card-sub { font-size: 12px; color: var(--texto-fraco); margin-top: 6px; }
  .secao { margin-bottom: 28px; }
  .secao-titulo { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--verde); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .secao-titulo::after { content: ''; flex: 1; height: 1px; background: var(--borda); }
  .funil-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .etapa-card { background: var(--cinza); border: 1px solid var(--borda); border-radius: 12px; padding: 16px; text-align: center; }
  .etapa-nome { font-size: 12px; color: var(--texto-fraco); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .etapa-count { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--texto); }
  .etapa-bar { height: 3px; background: var(--borda); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .etapa-bar-fill { height: 100%; background: linear-gradient(90deg, var(--verde-escuro), var(--verde)); border-radius: 2px; transition: width 0.8s ease; }
  .tabela-wrap { background: var(--azul-meio); border: 1px solid var(--borda); border-radius: 16px; overflow: hidden; }
  .tabela-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--borda); }
  .tabela-titulo { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  #busca-lead { background: var(--cinza); border: 1px solid var(--borda); border-radius: 8px; padding: 7px 14px; color: var(--texto); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; width: 220px; }
  #busca-lead:focus { border-color: var(--verde); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 10px 16px; text-align: left; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--texto-fraco); background: var(--cinza); }
  td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--texto); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,200,150,0.04); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-verde { background: rgba(0,200,150,0.15); color: var(--verde); }
  .badge-azul  { background: rgba(30,100,255,0.15); color: #6BAAFF; }
  .badge-roxo  { background: rgba(160,80,255,0.15); color: #C084FC; }
  .badge-cinza { background: rgba(255,255,255,0.08); color: var(--texto-fraco); }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--borda); border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--texto-fraco); }
  #erro-msg { display: none; background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); border-radius: 12px; padding: 20px 24px; margin: 20px 0; color: #FF8080; font-size: 14px; }
  .atualizado { font-size: 12px; color: var(--texto-fraco); }
  @media (max-width: 600px) { .main { padding: 16px; } header { padding: 16px; } .card-valor { font-size: 28px; } #busca-lead { width: 150px; } th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) { display: none; } }
</style>
</head>
<body>
 
<header>
  <div class="logo">Gaideski <span>· CRM</span></div>
  <div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-txt">Conectando...</span>
  </div>
</header>
 
<div class="main">
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-txt">Carregando dados do Kommo...</div>
  </div>
  <div id="erro-msg"></div>
  <div id="conteudo" style="display:none">
    <div class="cards-grid">
      <div class="card"><div class="card-label">Total de Leads</div><div class="card-valor" id="total-leads">—</div><div class="card-sub">no funil principal</div></div>
      <div class="card"><div class="card-label">Novos (7 dias)</div><div class="card-valor" id="leads-semana">—</div><div class="card-sub">últimos 7 dias</div></div>
      <div class="card"><div class="card-label">Em Negociação</div><div class="card-valor" id="em-negociacao">—</div><div class="card-sub">propostas ativas</div></div>
      <div class="card"><div class="card-label">Ganhos</div><div class="card-valor" id="ganhos">—</div><div class="card-sub">clientes fechados</div></div>
    </div>
    <div class="secao">
      <div class="secao-titulo">Etapas do Funil</div>
      <div class="funil-grid" id="funil-etapas"></div>
    </div>
    <div class="secao">
      <div class="secao-titulo">Leads Recentes</div>
      <div class="tabela-wrap">
        <div class="tabela-header">
          <div class="tabela-titulo">Todos os leads</div>
          <input type="text" id="busca-lead" placeholder="Buscar lead..." oninput="filtrarLeads()">
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Nome</th><th>Etapa</th><th>Responsável</th><th>Criado em</th><th>Valor</th></tr></thead>
            <tbody id="tabela-leads"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="atualizado" id="atualizado-em"></div>
  </div>
</div>
 
<script>
// Usa o proxy interno do Netlify — sem CORS!
const BASE = '/kommo-api';
 
let todosLeads = [];
 
async function kommoFetch(endpoint) {
  const r = await fetch(BASE + endpoint);
  if (!r.ok) throw new Error('Erro ' + r.status + ' ao buscar dados');
  return r.json();
}
 
function statusOk(txt)   { document.getElementById('status-dot').className='ok';   document.getElementById('status-txt').textContent=txt; }
function statusErro(txt) { document.getElementById('status-dot').className='erro'; document.getElementById('status-txt').textContent=txt; }
 
function mostrarErro(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('erro-msg');
  el.style.display = 'block';
  el.innerHTML = '<strong>Erro ao carregar dados</strong><br><br>' + msg + '<br><br><button onclick="carregarDados()" style="background:var(--verde);color:var(--azul);border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600">Tentar novamente</button>';
  statusErro('Erro de conexão');
}
 
function badgeEtapa(nome) {
  const n = (nome||'').toLowerCase();
  if (n.includes('novo') || n.includes('entrada')) return 'badge-cinza';
  if (n.includes('proposta') || n.includes('enviado')) return 'badge-azul';
  if (n.includes('contrato') || n.includes('fechado') || n.includes('ganho')) return 'badge-verde';
  return 'badge-roxo';
}
 
function formatData(ts) { if (!ts) return '—'; return new Date(ts * 1000).toLocaleDateString('pt-BR'); }
function formatValor(v) { if (!v) return '—'; return 'R$ ' + Number(v).toLocaleString('pt-BR'); }
 
async function carregarDados() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('conteudo').style.display = 'none';
  document.getElementById('erro-msg').style.display = 'none';
 
  try {
    const [pipeData, leadsData] = await Promise.all([
      kommoFetch('/leads/pipelines?limit=50'),
      kommoFetch('/leads?limit=250&order[created_at]=desc')
    ]);
 
    const pipelines = pipeData?._embedded?.pipelines || [];
    const leads = leadsData?._embedded?.leads || [];
    todosLeads = leads;
 
    const agora = Math.floor(Date.now() / 1000);
    document.getElementById('total-leads').textContent   = leads.length;
    document.getElementById('leads-semana').textContent  = leads.filter(l => l.created_at >= agora - 7*86400).length;
    document.getElementById('em-negociacao').textContent = leads.filter(l => !l.closed_at && l.status_id !== 142 && l.status_id !== 143).length;
    document.getElementById('ganhos').textContent        = leads.filter(l => l.status_id === 142).length;
 
    const statusMap = {};
    pipelines.forEach(p => (p._embedded?.statuses || []).forEach(s => { statusMap[s.id] = s.name; }));
 
    const contagem = {};
    leads.forEach(l => { contagem[l.status_id] = (contagem[l.status_id]||0) + 1; });
    const maxCount = Math.max(...Object.values(contagem), 1);
 
    document.getElementById('funil-etapas').innerHTML = Object.entries(contagem)
      .sort((a,b) => b[1]-a[1]).slice(0, 10)
      .map(([sid, cnt]) => {
        const nome = statusMap[sid] || 'Etapa ' + sid;
        const pct  = Math.round(cnt / maxCount * 100);
        return '<div class="etapa-card"><div class="etapa-nome" title="' + nome + '">' + nome + '</div><div class="etapa-count">' + cnt + '</div><div class="etapa-bar"><div class="etapa-bar-fill" style="width:' + pct + '%"></div></div></div>';
      }).join('') || '<div style="color:var(--texto-fraco);font-size:13px">Nenhuma etapa encontrada</div>';
 
    renderTabela(leads);
    document.getElementById('atualizado-em').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('conteudo').style.display = 'block';
    statusOk('Conectado ao Kommo');
    setTimeout(carregarDados, 5 * 60 * 1000);
 
  } catch(e) {
    mostrarErro(e.message || 'Erro desconhecido');
  }
}
 
function renderTabela(leads) {
  const tbody = document.getElementById('tabela-leads');
  if (!leads.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--texto-fraco);padding:30px">Nenhum lead encontrado</td></tr>'; return; }
  tbody.innerHTML = leads.slice(0, 100).map(l => {
    const etapa = l._embedded?.pipeline?.name || l.status_id || '—';
    return '<tr><td><strong>' + (l.name||'—') + '</strong></td><td><span class="badge ' + badgeEtapa(typeof etapa === 'string' ? etapa : '') + '">' + etapa + '</span></td><td>' + (l._embedded?.responsible_user?.name||'—') + '</td><td>' + formatData(l.created_at) + '</td><td>' + formatValor(l.price) + '</td></tr>';
  }).join('');
}
 
function filtrarLeads() {
  const q = document.getElementById('busca-lead').value.toLowerCase();
  renderTabela(q ? todosLeads.filter(l => (l.name||'').toLowerCase().includes(q)) : todosLeads);
}
 
carregarDados();
</script>
</body>
</html>
