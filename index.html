<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial · Gaideski</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #F5F6F8; color: #1A1D23; min-height: 100vh; font-size: 14px; }
  header { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 15px; font-weight: 600; color: #1A1D23; letter-spacing: -0.3px; }
  .logo span { color: #9CA3AF; font-weight: 400; }
  #status-pill { display: flex; align-items: center; gap: 7px; font-size: 12px; color: #6B7280; background: #F9FAFB; padding: 5px 12px; border-radius: 20px; border: 1px solid #E5E7EB; }
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #D1D5DB; }
  #status-dot.ok   { background: #10B981; }
  #status-dot.erro { background: #EF4444; }
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .page-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; }
  .page-title span { font-size: 13px; font-weight: 400; color: #9CA3AF; margin-left: 8px; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 20px 22px; }
  .card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: #9CA3AF; margin-bottom: 10px; }
  .card-valor { font-size: 32px; font-weight: 700; color: #111827; line-height: 1; }
  .card-sub { font-size: 12px; color: #9CA3AF; margin-top: 5px; }
  .card-accent { border-left: 3px solid #111827; }
  .card-green  { border-left: 3px solid #10B981; }
  .card-blue   { border-left: 3px solid #3B82F6; }
  .card-gray   { border-left: 3px solid #9CA3AF; }
  .secao { margin-bottom: 24px; }
  .secao-titulo { font-size: 11px; font-weight: 600; color: #6B7280; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .funil-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .etapa-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; padding: 14px 16px; }
  .etapa-nome { font-size: 11px; color: #6B7280; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .etapa-count { font-size: 24px; font-weight: 700; color: #111827; }
  .etapa-bar { height: 2px; background: #F3F4F6; border-radius: 2px; margin-top: 8px; }
  .etapa-bar-fill { height: 100%; background: #374151; border-radius: 2px; transition: width 0.6s ease; }
  .tabela-wrap { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; overflow: hidden; }
  .tabela-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #F3F4F6; }
  .tabela-titulo { font-size: 13px; font-weight: 600; color: #374151; }
  #busca-lead { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 6px; padding: 6px 12px; color: #374151; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; width: 200px; }
  #busca-lead:focus { border-color: #9CA3AF; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: #9CA3AF; background: #F9FAFB; border-bottom: 1px solid #F3F4F6; }
  td { padding: 11px 16px; border-bottom: 1px solid #F9FAFB; color: #374151; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #FAFAFA; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-ganho    { background: #ECFDF5; color: #065F46; }
  .badge-proposta { background: #EFF6FF; color: #1D4ED8; }
  .badge-negoc    { background: #FEF3C7; color: #92400E; }
  .badge-contato  { background: #F9FAFB; color: #374151; border: 1px solid #E5E7EB; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #E5E7EB; border-top-color: #374151; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 13px; color: #9CA3AF; }
  #erro-msg { display: none; background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 16px 20px; margin: 16px 0; color: #991B1B; font-size: 13px; }
  .atualizado { font-size: 11px; color: #D1D5DB; margin-top: 16px; }
  @media (max-width: 600px) { .main { padding: 16px; } header { padding: 0 16px; } th:nth-child(3), td:nth-child(3), th:nth-child(4), td:nth-child(4) { display: none; } }
</style>
</head>
<body>
 
<header>
  <div class="logo">Gaideski <span>· Dashboard Comercial</span></div>
  <div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-txt">Conectando...</span>
  </div>
</header>
 
<div class="main">
  <div id="loading"><div class="spinner"></div><div class="loading-txt">Carregando dados do Kommo...</div></div>
  <div id="erro-msg"></div>
  <div id="conteudo" style="display:none">
 
    <div class="page-title">Visão Geral <span id="data-atual"></span></div>
 
    <div class="cards-grid">
      <div class="card card-accent"><div class="card-label">Total de Leads</div><div class="card-valor" id="total-leads">—</div><div class="card-sub">no funil</div></div>
      <div class="card card-blue"><div class="card-label">Novos (7 dias)</div><div class="card-valor" id="leads-semana">—</div><div class="card-sub">últimos 7 dias</div></div>
      <div class="card card-gray"><div class="card-label">Em Negociação</div><div class="card-valor" id="em-negociacao">—</div><div class="card-sub">propostas ativas</div></div>
      <div class="card card-green"><div class="card-label">Ganhos</div><div class="card-valor" id="ganhos">—</div><div class="card-sub">clientes fechados</div></div>
    </div>
 
    <div class="secao">
      <div class="secao-titulo">Etapas do Funil</div>
      <div class="funil-grid" id="funil-etapas"></div>
    </div>
 
    <div class="secao">
      <div class="secao-titulo">Leads Recentes</div>
      <div class="tabela-wrap">
        <div class="tabela-header">
          <div class="tabela-titulo">Todos os leads</div>
          <input type="text" id="busca-lead" placeholder="Buscar lead..." oninput="filtrarLeads()">
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>Nome</th><th>Etapa</th><th>Responsável</th><th>Data</th><th>Valor</th></tr></thead>
            <tbody id="tabela-leads"></tbody>
          </table>
        </div>
      </div>
    </div>
 
    <div class="atualizado" id="atualizado-em"></div>
  </div>
</div>
 
<script>
const BASE = '/kommo-api';
let todosLeads = [];
let _statusMap = {};
 
async function kommoFetch(ep) {
  const r = await fetch(BASE + ep);
  if (!r.ok) throw new Error('Erro ' + r.status);
  return r.json();
}
 
function statusOk(t)   { document.getElementById('status-dot').className='ok';   document.getElementById('status-txt').textContent=t; }
function statusErro(t) { document.getElementById('status-dot').className='erro'; document.getElementById('status-txt').textContent=t; }
 
function mostrarErro(m) {
  document.getElementById('loading').style.display='none';
  const el=document.getElementById('erro-msg');
  el.style.display='block';
  el.innerHTML='<strong>Erro ao carregar dados</strong><br><br>'+m+'<br><br><button onclick="carregar()" style="background:#1F2937;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px">Tentar novamente</button>';
  statusErro('Erro');
}
 
function badgeClass(nome) {
  const n=(nome||'').toLowerCase();
  if(n.includes('ganho')||n.includes('contrato')||n.includes('onboarding')) return 'badge-ganho';
  if(n.includes('proposta')||n.includes('offer')||n.includes('negotiation')) return 'badge-proposta';
  if(n.includes('atendimento')||n.includes('reunião')||n.includes('qualif')||n.includes('no-show')) return 'badge-negoc';
  return 'badge-contato';
}
 
function formatData(ts) { if(!ts)return'—'; return new Date(ts*1000).toLocaleDateString('pt-BR'); }
function formatValor(v) { if(!v)return'—'; return 'R$ '+Number(v).toLocaleString('pt-BR'); }
 
async function carregar() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('conteudo').style.display='none';
  document.getElementById('erro-msg').style.display='none';
  try {
    const [ld, pd] = await Promise.all([
      kommoFetch('/leads?limit=250&order[created_at]=desc'),
      kommoFetch('/leads/pipelines?limit=50')
    ]);
    const leads = ld?._embedded?.leads || [];
    const pipes = pd?._embedded?.pipelines || [];
    todosLeads = leads;
    pipes.forEach(p=>(p._embedded?.statuses||[]).forEach(s=>{_statusMap[s.id]=s.name}));
    const agora = Math.floor(Date.now()/1000);
    document.getElementById('data-atual').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    document.getElementById('total-leads').textContent   = leads.length;
    document.getElementById('leads-semana').textContent  = leads.filter(l=>l.created_at>=agora-7*86400).length;
    document.getElementById('em-negociacao').textContent = leads.filter(l=>!l.closed_at&&l.status_id!==142&&l.status_id!==143).length;
    document.getElementById('ganhos').textContent        = leads.filter(l=>l.status_id===142).length;
    const contagem = {};
    leads.forEach(l=>{contagem[l.status_id]=(contagem[l.status_id]||0)+1});
    const maxCount = Math.max(...Object.values(contagem),1);
    document.getElementById('funil-etapas').innerHTML = Object.entries(contagem)
      .sort((a,b)=>b[1]-a[1]).slice(0,12)
      .map(([sid,cnt])=>{
        const nome=_statusMap[sid]||'Etapa '+sid;
        const pct=Math.round(cnt/maxCount*100);
        return '<div class="etapa-card"><div class="etapa-nome" title="'+nome+'">'+nome+'</div><div class="etapa-count">'+cnt+'</div><div class="etapa-bar"><div class="etapa-bar-fill" style="width:'+pct+'%"></div></div></div>';
      }).join('');
    renderTabela(leads);
    document.getElementById('atualizado-em').textContent='Atualizado em '+new Date().toLocaleString('pt-BR');
    document.getElementById('loading').style.display='none';
    document.getElementById('conteudo').style.display='block';
    statusOk('Conectado ao Kommo');
    setTimeout(carregar,5*60*1000);
  } catch(e) { mostrarErro(e.message||'Erro desconhecido'); }
}
 
function renderTabela(leads) {
  const tbody=document.getElementById('tabela-leads');
  if(!leads.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;color:#9CA3AF;padding:28px">Nenhum lead encontrado</td></tr>';return;}
  tbody.innerHTML=leads.slice(0,100).map(l=>{
    const etapaNome=_statusMap[l.status_id]||String(l.status_id);
    return '<tr><td><span style="font-weight:500;color:#111827">'+(l.name||'—')+'</span></td><td><span class="badge '+badgeClass(etapaNome)+'">'+etapaNome+'</span></td><td style="color:#6B7280">'+(l._embedded?.responsible_user?.name||'—')+'</td><td style="color:#9CA3AF">'+formatData(l.created_at)+'</td><td style="color:#374151">'+formatValor(l.price)+'</td></tr>';
  }).join('');
}
 
function filtrarLeads() {
  const q=document.getElementById('busca-lead').value.toLowerCase();
  renderTabela(q?todosLeads.filter(l=>(l.name||'').toLowerCase().includes(q)):todosLeads);
}
 
carregar();
</script>
</body>
</html>
